services:

  dataflow_postgres_db:
    restart: unless-stopped
    image: opencsg-registry.cn-beijing.cr.aliyuncs.com/opencsghq/postgres:15.10
    volumes:
      - /dataflow_data/postgres_db_data:/var/lib/postgresql/data
    command: -p 5432
    environment:
      - POSTGRES_DB=data_flow
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    networks:
      - csg-network

  dataflow_log_postgres_db:
    restart: unless-stopped
    image: opencsg-registry.cn-beijing.cr.aliyuncs.com/opencsghq/postgres:15.10
    volumes:
      - /dataflow_data/log_postgres_db_data:/var/lib/postgresql/data
    command: -p 5432
    environment:
      - POSTGRES_DB=data_flow_log
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5434:5432"
    networks:
      - csg-network

  dataflow_label_studio:
    stdin_open: true
    tty: true
    image: opencsg-registry.cn-beijing.cr.aliyuncs.com/opencsghq/label-studio:20251128
    restart: unless-stopped
    expose:
      - "8002"
    depends_on:
      - dataflow_postgres_db
    environment:
      - DJANGO_DB=default
      - POSTGRE_NAME=postgres
      - POSTGRE_USER=postgres
      - POSTGRE_PASSWORD=postgres
      - POSTGRE_PORT=5432
      - POSTGRE_HOST=dataflow_postgres_db
      - LABEL_STUDIO_HOST=${LABEL_STUDIO_HOST:-}
      - JSON_LOG=1
      - LABEL_STUDIO_HOST=0.0.0.0
      - CSGHUB_ENDPOINT= https://hub.opencsg-stg.com
      - LABEL_STUDIO_PORT=8002
    volumes:
      - /dataflow_data/label-studio:/label-studio/data:rw
    ports:
      - "8002:8002"
    command: label-studio
    networks:
      - csg-network

  dataflow_api_server:
    restart: unless-stopped
    image: opencsg-registry.cn-beijing.cr.aliyuncs.com/opencsghq/dataflow:20251130.1
    command: >
      sh -c "
        uvicorn data_server.main:app --host 0.0.0.0 --port 8000
      "
    volumes:
      - /dataflow_data/apidata:/data/dataflow_data
    environment:
      - DATA_DIR=/data/dataflow_data
      - CSGHUB_ENDPOINT=https://hub.opencsg-stg.com
      - MAX_WORKERS=99
      - RAY_ADDRESS=auto
      - RAY_ENABLE=False
      - RAY_LOG_DIR=/home/output
      - API_SERVER=0.0.0.0
      - API_PORT=8000
      - ENABLE_OPENTELEMETRY=False
      - DATABASE_DB=data_flow
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_HOSTNAME=dataflow_postgres_db
      - DATABASE_PORT=5432
      - LOG_DATABASE_DB=data_flow_log
      - LOG_DATABASE_USERNAME=postgres
      - LOG_DATABASE_PASSWORD=postgres
      - LOG_DATABASE_HOSTNAME=dataflow_log_postgres_db
      - LOG_DATABASE_PORT=5432
      - STUDIO_JUMP_URL=http://39.102.214.107:8002
      - MINERU_API_URL=http://111.4.242.20:30000
      - CSGHUB_DATAFLOW_TEMPLATE_IMAGE=opencsg_public/dataflow:argo-latest
    ports:
      - "8000:8000"
    depends_on:
      - dataflow_postgres_db
      - dataflow_log_postgres_db
    networks:
      - csg-network

networks:
  csg-network:
    driver: bridge
